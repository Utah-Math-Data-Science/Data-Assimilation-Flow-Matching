# @package _global_
defaults:
  - override /dataset@setting.dataset: DynamicalSystemImpl
  - override /dataset/system@setting.dataset.system: KuramotoSivashinsky
  - override /splitter@setting.splitter: OneSplit
  - _self_

setting:
  dataset:
    time_step_count: ${add:${..splitter.start_train},${mul:${..observe_every_n_time_steps},1000}}
    system:
      time_step_size: .25
      dimension: 1024
      domain_pi_multiple: 128
  splitter:
    start_train: 2000
    len_train: ${sub:${..dataset.time_step_count},${.start_train}}
  obs_noise_std: .1
  observe_every_n_time_steps: 4
  observes:
    - _target_: conf.observe.ObserveATan
      order: 0
filter:
  ensemble_size: 20
  ensemble_initial_std: 1.
