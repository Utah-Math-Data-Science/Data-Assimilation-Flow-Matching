# @package _global_
defaults:
  - override /dataset@setting.dataset: DynamicalSystemImpl
  - override /dataset/system@setting.dataset.system: Lorenz63
  - override /splitter@setting.splitter: OneSplit
  - _self_

setting:
  dataset:
    time_step_count: ${add:${..splitter.start_train},${mul:${..observe_every_n_time_steps},2000}}
    system:
      time_step_size: .05
      true_state_initial_condition_mean: 0.
      true_state_initial_condition_std: 1.
  splitter:
    start_train: 2000
    len_train: ${sub:${..dataset.time_step_count},${.start_train}}
  obs_noise_std: 2.
  observe_every_n_time_steps: 2
  observes:
    - _target_: conf.observe.ObserveIdentity
      order: 0
filter:
  ensemble_size: 20
  ensemble_initial_std: 1.
